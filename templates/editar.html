{% extends "layout.html" %}
{% block content %}
<section class="card">
    <h2>Editar trámite</h2>
    <p>Modifica la información del ciudadano y los datos del trámite.</p>

    <form method="post" class="form-grid">
        <h3>Datos del ciudadano</h3>
        <label>DNI
            <input type="text" name="dni" required placeholder="Ej. 71234567" value="{{ tramite['dni'] }}">
        </label>
        <label>Nombres y apellidos
            <input type="text" name="nombres" required placeholder="Ej. Juan Pérez Silva" value="{{ tramite['nombres'] }}">
        </label>
        <label>Teléfono
            <input type="text" name="telefono" placeholder="Ej. 999999999" value="{{ tramite['telefono'] }}">
        </label>
        <label>Correo
            <input type="email" name="correo" placeholder="ciudadano@correo.com" value="{{ tramite['correo'] }}">
        </label>
        <label class="full">Dirección
            <input type="text" name="direccion" placeholder="Dirección del ciudadano" value="{{ tramite['direccion'] }}">
        </label>

        <h3>Datos del trámite</h3>
        <label>Tipo de trámite
            <select name="tipo_tramite" required>
                {% for item in tipos_tramite %}
                    <option value="{{ item }}" {% if item == tramite['tipo_tramite'] %}selected{% endif %}>{{ item }}</option>
                {% endfor %}
            </select>
        </label>
        <label>Área responsable
            <select name="area" required>
                {% for item in areas %}
                    <option value="{{ item }}" {% if item == tramite['area'] %}selected{% endif %}>{{ item }}</option>
                {% endfor %}
            </select>
        </label>
        <label>Documentos completos
            <select name="documentos_completos" required>
                <option value="Si" {% if tramite['documentos_completos'] == 'Si' %}selected{% endif %}>Sí</option>
                <option value="No" {% if tramite['documentos_completos'] == 'No' %}selected{% endif %}>No</option>
            </select>
        </label>
        <label>Número de derivaciones
            <input type="number" name="num_derivaciones" min="1" max="10" value="{{ tramite['num_derivaciones'] }}" required>
        </label>
        <label>Días transcurridos
            <input type="number" name="dias_transcurridos" min="0" max="100" value="{{ tramite['dias_transcurridos'] }}" required>
        </label>
        <label>Carga del área
            <select name="carga_area" required>
                {% for item in cargas %}
                    <option value="{{ item }}" {% if item == tramite['carga_area'] %}selected{% endif %}>{{ item }}</option>
                {% endfor %}
            </select>
        </label>

        <div class="full actions">
            <button class="button" type="submit">Guardar cambios</button>
            <a class="button secondary" href="{{ url_for('detalle_tramite', tramite_id=tramite['id']) }}">Cancelar</a>
        </div>
    </form>
</section>
{% endblock %}
